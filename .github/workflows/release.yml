name: 发布桌面安装包

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: 发布版本标签，例如 v0.1.0
        required: true
        type: string

permissions:
  contents: write

jobs:
  build:
    name: 构建 ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS
            os: macos-latest
            command: npm run build:mac
            artifact: release-macos-latest
          - name: Windows
            os: windows-latest
            command: npm run build:win
            artifact: release-windows-latest
          - name: Linux
            os: ubuntu-latest
            command: npm run build:linux
            artifact: release-ubuntu-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v5
        with:
          ref: ${{ inputs.tag || github.ref_name }}

      - name: 校验发布版本
        shell: bash
        run: |
          tag_version="${{ inputs.tag || github.ref_name }}"
          tag_version="${tag_version#v}"
          package_version="$(node -p "require('./package.json').version")"
          if [ "$tag_version" != "$package_version" ]; then
            echo "标签版本 $tag_version 与 package.json 版本 $package_version 不一致"
            exit 1
          fi

      - name: 生成更新日志
        run: node scripts/generate-changelog.mjs

      - name: 设置 Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm

      - name: 安装依赖
        run: npm ci

      - name: 构建安装包
        run: ${{ matrix.command }}

      - name: 打包更新日志
        shell: bash
        run: |
          mkdir -p release
          cp CHANGELOG.md release/CHANGELOG.md

      - name: 上传构建产物
        uses: actions/upload-artifact@v5
        with:
          name: ${{ matrix.artifact }}
          path: release
          if-no-files-found: error
          retention-days: 1

  publish:
    name: 创建 GitHub Release
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: 下载构建产物
        uses: actions/download-artifact@v5
        with:
          pattern: release-*
          path: release-assets
          merge-multiple: false

      - name: 收集安装包
        shell: bash
        run: |
          mkdir -p release-files
          find release-assets -type f \( \
            -iname '*.dmg' -o \
            -iname '*.zip' -o \
            -iname '*.exe' -o \
            -iname '*.appimage' -o \
            -iname '*.deb' \
            -o -iname 'latest*.yml' -o \
            -iname 'latest*.yaml' -o \
            -iname 'CHANGELOG.md' \
          \) -exec cp {} release-files/ \;
          test -n "$(find release-files -type f -print -quit)"

          # electron-updater 在 macOS 上固定请求 latest-mac.yml。
          # 缺少更新清单时继续发布会导致已安装客户端在检查更新时收到 404。
          test -s release-files/latest-mac.yml

          # 每个构建平台都必须带上自己的更新清单，便于后续诊断发布产物。
          test -s release-files/latest.yml
          test -s release-files/latest-linux.yml

      - name: 发布 Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag || github.ref_name }}
          name: API-forge ${{ inputs.tag || github.ref_name }}
          make_latest: true
          prerelease: false
          generate_release_notes: true
          files: release-files/*
