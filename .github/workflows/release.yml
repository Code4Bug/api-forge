name: 发布桌面安装包

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: 构建 ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macOS
            os: macos-latest
            command: npm run build:mac
          - name: Windows
            os: windows-latest
            command: npm run build:win
          - name: Linux
            os: ubuntu-latest
            command: npm run build:linux

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: 安装依赖
        run: npm ci

      - name: 构建安装包
        run: ${{ matrix.command }}

      - name: 上传构建产物
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.os }}
          path: release
          if-no-files-found: error
          retention-days: 1

  publish:
    name: 创建 GitHub Release
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: 下载构建产物
        uses: actions/download-artifact@v4
        with:
          pattern: release-*
          path: release-assets
          merge-multiple: false

      - name: 收集安装包
        shell: bash
        run: |
          mkdir -p release-files
          find release-assets -type f \( \
            -iname '*.dmg' -o \
            -iname '*.zip' -o \
            -iname '*.exe' -o \
            -iname '*.appimage' -o \
            -iname '*.deb' \
          \) -exec cp {} release-files/ \;
          test -n "$(find release-files -type f -print -quit)"

      - name: 发布 Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: API-forge ${{ github.ref_name }}
          generate_release_notes: true
          files: release-files/*
